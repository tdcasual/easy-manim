x-backend-environment: &backend-environment
  PYTHONUNBUFFERED: "1"
  EASY_MANIM_AUTH_MODE: ${EASY_MANIM_AUTH_MODE:-required}
  EASY_MANIM_ANONYMOUS_AGENT_ID: ${EASY_MANIM_ANONYMOUS_AGENT_ID:-local-anonymous}
  EASY_MANIM_MANIM_COMMAND: ${EASY_MANIM_MANIM_COMMAND:-manim}
  EASY_MANIM_LATEX_COMMAND: ${EASY_MANIM_LATEX_COMMAND:-latex}
  EASY_MANIM_DVISVGM_COMMAND: ${EASY_MANIM_DVISVGM_COMMAND:-dvisvgm}
  EASY_MANIM_FFMPEG_COMMAND: ${EASY_MANIM_FFMPEG_COMMAND:-ffmpeg}
  EASY_MANIM_FFPROBE_COMMAND: ${EASY_MANIM_FFPROBE_COMMAND:-ffprobe}
  EASY_MANIM_RENDER_TIMEOUT_SECONDS: ${EASY_MANIM_RENDER_TIMEOUT_SECONDS:-300}
  EASY_MANIM_DEFAULT_QUALITY_PRESET: ${EASY_MANIM_DEFAULT_QUALITY_PRESET:-development}
  EASY_MANIM_DEFAULT_FRAME_RATE: ${EASY_MANIM_DEFAULT_FRAME_RATE:-}
  EASY_MANIM_DEFAULT_PIXEL_WIDTH: ${EASY_MANIM_DEFAULT_PIXEL_WIDTH:-}
  EASY_MANIM_DEFAULT_PIXEL_HEIGHT: ${EASY_MANIM_DEFAULT_PIXEL_HEIGHT:-}
  EASY_MANIM_SANDBOX_NETWORK_DISABLED: ${EASY_MANIM_SANDBOX_NETWORK_DISABLED:-false}
  EASY_MANIM_SANDBOX_PROCESS_LIMIT: ${EASY_MANIM_SANDBOX_PROCESS_LIMIT:-}
  EASY_MANIM_SANDBOX_MEMORY_LIMIT_MB: ${EASY_MANIM_SANDBOX_MEMORY_LIMIT_MB:-}
  EASY_MANIM_SANDBOX_TEMP_ROOT: ${EASY_MANIM_SANDBOX_TEMP_ROOT:-}
  EASY_MANIM_RELEASE_CHANNEL: ${EASY_MANIM_RELEASE_CHANNEL:-beta}
  EASY_MANIM_DEFAULT_POLL_AFTER_MS: ${EASY_MANIM_DEFAULT_POLL_AFTER_MS:-2000}
  EASY_MANIM_LLM_PROVIDER: ${EASY_MANIM_LLM_PROVIDER:-stub}
  EASY_MANIM_LLM_MODEL: ${EASY_MANIM_LLM_MODEL:-stub-manim-v1}
  EASY_MANIM_LLM_BASE_URL: ${EASY_MANIM_LLM_BASE_URL:-}
  EASY_MANIM_LLM_API_KEY: ${EASY_MANIM_LLM_API_KEY:-}
  EASY_MANIM_LLM_TIMEOUT_SECONDS: ${EASY_MANIM_LLM_TIMEOUT_SECONDS:-60}
  EASY_MANIM_LLM_MAX_RETRIES: ${EASY_MANIM_LLM_MAX_RETRIES:-2}
  EASY_MANIM_WORKER_POLL_INTERVAL_SECONDS: ${EASY_MANIM_WORKER_POLL_INTERVAL_SECONDS:-0.2}
  EASY_MANIM_WORKER_ID: ${EASY_MANIM_WORKER_ID:-worker-1}
  EASY_MANIM_WORKER_LEASE_SECONDS: ${EASY_MANIM_WORKER_LEASE_SECONDS:-30}
  EASY_MANIM_WORKER_RECOVERY_GRACE_SECONDS: ${EASY_MANIM_WORKER_RECOVERY_GRACE_SECONDS:-5}
  EASY_MANIM_WORKER_STALE_AFTER_SECONDS: ${EASY_MANIM_WORKER_STALE_AFTER_SECONDS:-30}
  EASY_MANIM_MAX_QUEUED_TASKS: ${EASY_MANIM_MAX_QUEUED_TASKS:-20}
  EASY_MANIM_MAX_ATTEMPTS_PER_ROOT_TASK: ${EASY_MANIM_MAX_ATTEMPTS_PER_ROOT_TASK:-5}
  EASY_MANIM_AGENT_LEARNING_AUTO_APPLY_ENABLED: ${EASY_MANIM_AGENT_LEARNING_AUTO_APPLY_ENABLED:-false}
  EASY_MANIM_AGENT_LEARNING_AUTO_APPLY_MIN_COMPLETED_TASKS: ${EASY_MANIM_AGENT_LEARNING_AUTO_APPLY_MIN_COMPLETED_TASKS:-5}
  EASY_MANIM_AGENT_LEARNING_AUTO_APPLY_MIN_QUALITY_SCORE: ${EASY_MANIM_AGENT_LEARNING_AUTO_APPLY_MIN_QUALITY_SCORE:-0.9}
  EASY_MANIM_AGENT_LEARNING_AUTO_APPLY_MAX_RECENT_FAILURES: ${EASY_MANIM_AGENT_LEARNING_AUTO_APPLY_MAX_RECENT_FAILURES:-0}
  EASY_MANIM_AUTO_REPAIR_ENABLED: ${EASY_MANIM_AUTO_REPAIR_ENABLED:-false}
  EASY_MANIM_AUTO_REPAIR_MAX_CHILDREN_PER_ROOT: ${EASY_MANIM_AUTO_REPAIR_MAX_CHILDREN_PER_ROOT:-1}

x-backend-service: &backend-service
  image: ${EASY_MANIM_BACKEND_IMAGE:-ghcr.io/tdcasual/easy-manim:latest}
  environment:
    <<: *backend-environment
  init: true
  restart: unless-stopped
  volumes:
    - easy_manim_data:/app/data

services:
  bootstrap:
    <<: *backend-service
    command:
      - easy-manim-db-bootstrap
      - --data-dir
      - /app/data
    restart: "no"

  api:
    <<: *backend-service
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    command:
      - easy-manim-api
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --data-dir
      - /app/data
      - --no-embedded-worker
    expose:
      - "8001"
    labels:
      - "traefik.http.routers.http-0-${COOLIFY_RESOURCE_UUID}-api.service=http-0-${COOLIFY_RESOURCE_UUID}-api"
      - "traefik.http.routers.https-0-${COOLIFY_RESOURCE_UUID}-api.service=http-0-${COOLIFY_RESOURCE_UUID}-api"
      - "traefik.http.services.http-0-${COOLIFY_RESOURCE_UUID}-api.loadbalancer.server.port=8001"
      - "caddy_0.handle_path.0_reverse_proxy={{upstreams 8001}}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8001/healthz", timeout=5).read()
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

  worker:
    <<: *backend-service
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    command:
      - easy-manim-worker
      - --data-dir
      - /app/data

  ui:
    image: ${EASY_MANIM_UI_IMAGE:-ghcr.io/tdcasual/easy-manim-ui:latest}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    restart: unless-stopped

  mcp:
    <<: *backend-service
    profiles:
      - mcp
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    command:
      - easy-manim-mcp
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --data-dir
      - /app/data
      - --no-embedded-worker
    ports:
      - "${EASY_MANIM_MCP_PORT:-8000}:8000"

volumes:
  easy_manim_data:
