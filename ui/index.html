<!doctype html>
<html lang="zh-CN" data-theme="day">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>easy-manim AI 动画创作室</title>
    <meta name="description" content="easy-manim AI 动画创作室 - 用自然语言生成专业数学动画视频" />
    
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 初始化主题，防止闪烁 -->
    <script>
      (function() {
        const theme = localStorage.getItem('easy_manim_theme') || 'day';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    
    <style>
      /* 初始加载样式 */
      html {
        background: linear-gradient(180deg, #e8f4f8 0%, #f0f7fa 50%, #fff8f0 100%);
        min-height: 100%;
      }

      html[data-theme="night"] {
        background: linear-gradient(180deg, #0a0e1a 0%, #121829 50%, #1a2332 100%);
      }
      
      body {
        margin: 0;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
