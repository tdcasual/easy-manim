x-backend-service: &backend-service
  image: ${EASY_MANIM_BACKEND_IMAGE:-ghcr.io/tdcasual/easy-manim:latest}
  env_file:
    - .env
  init: true
  restart: unless-stopped
  volumes:
    - easy_manim_data:/app/data

services:
  bootstrap:
    <<: *backend-service
    command:
      - easy-manim-db-bootstrap
      - --data-dir
      - /app/data
    restart: "no"

  api:
    <<: *backend-service
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    command:
      - easy-manim-api
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --data-dir
      - /app/data
      - --no-embedded-worker
    expose:
      - "8001"
    labels:
      - "traefik.http.routers.http-0-${COOLIFY_RESOURCE_UUID}-api.service=http-0-${COOLIFY_RESOURCE_UUID}-api"
      - "traefik.http.routers.https-0-${COOLIFY_RESOURCE_UUID}-api.service=http-0-${COOLIFY_RESOURCE_UUID}-api"
      - "traefik.http.services.http-0-${COOLIFY_RESOURCE_UUID}-api.loadbalancer.server.port=8001"
      - "caddy_0.handle_path.0_reverse_proxy={{upstreams 8001}}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8001/healthz", timeout=5).read()
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

  worker:
    <<: *backend-service
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    command:
      - easy-manim-worker
      - --data-dir
      - /app/data

  ui:
    image: ${EASY_MANIM_UI_IMAGE:-ghcr.io/tdcasual/easy-manim-ui:latest}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    restart: unless-stopped

  mcp:
    <<: *backend-service
    profiles:
      - mcp
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    command:
      - easy-manim-mcp
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --data-dir
      - /app/data
      - --no-embedded-worker
    ports:
      - "${EASY_MANIM_MCP_PORT:-8000}:8000"

volumes:
  easy_manim_data:
